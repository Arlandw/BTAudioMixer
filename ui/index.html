<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BTAudioMixer</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f1220;
        color: #fff;
      }
      .wrap { padding: 16px; }
      h1 { margin: 0 0 12px; font-size: 28px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
      .card {
        background: #1a1f35;
        border-radius: 14px;
        padding: 12px;
        min-width: 220px;
        flex: 1;
      }
      .btn {
        background: #2f6fff;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 16px;
        margin-right: 8px;
        margin-top: 8px;
      }
      .btn:disabled { opacity: 0.6; }
      .status { font-size: 14px; opacity: 0.9; margin-top: 8px; }
      .faders { display: flex; gap: 20px; justify-content: center; }
      .fader { width: 30%; min-width: 160px; text-align: center; }
      input[type='range'] { width: 100%; height: 36px; }
      .value { font-size: 20px; margin-top: 6px; }
      .meter {
        margin-top: 8px;
        height: 12px;
        border-radius: 999px;
        background: #0b0f1c;
        border: 1px solid #3f4a75;
        overflow: hidden;
      }
      .meterFill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #13d37a 0%, #66f09f 70%, #ffd166 100%);
        transition: width 180ms linear;
      }
      .mac {
        width: 100%;
        margin-top: 8px;
        border-radius: 10px;
        border: 1px solid #4b547d;
        background: #12172a;
        color: #fff;
        padding: 10px;
        box-sizing: border-box;
      }
      .small { font-size: 12px; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>BTAudioMixer</h1>
      <div class="row">
        <div class="card">
          <h3>Device Discovery</h3>
          <button class="btn" onclick="enablePairingMode(this)">Enable Mixer Pairing Mode (120s)</button>
          <button class="btn" onclick="scanDevices(this)">Scan Nearby Bluetooth Devices</button>
          <button class="btn" onclick="discoverNodes(this)">Bind Active Nodes</button>
          <div class="small">For phone/peloton: enable pairing mode here, then connect from those devices to this mixer.</div>
        </div>
      </div>
      <div class="row" id="roles"></div>

      <div class="card">
        <div class="faders">
          <div class="fader">
            <h3>Phone</h3>
            <input id="phoneGain" type="range" min="0" max="1" step="0.01" value="0.5" />
            <div class="value" id="phoneGainVal">50%</div>
            <div class="meter"><div class="meterFill" id="phoneMeter"></div></div>
          </div>
          <div class="fader">
            <h3>Peloton</h3>
            <input id="pelotonGain" type="range" min="0" max="1" step="0.01" value="0.5" />
            <div class="value" id="pelotonGainVal">50%</div>
            <div class="meter"><div class="meterFill" id="pelotonMeter"></div></div>
          </div>
          <div class="fader">
            <h3>Master</h3>
            <input id="masterGain" type="range" min="0" max="1" step="0.01" value="0.8" />
            <div class="value" id="masterGainVal">80%</div>
            <div class="meter"><div class="meterFill" id="masterMeter"></div></div>
          </div>
        </div>
        <button class="btn" onclick="saveGains()">Apply Mix</button>
        <button class="btn" onclick="preset(0.3,0.7,0.8)">Ride</button>
        <button class="btn" onclick="preset(0.6,0.4,0.8)">Podcast Focus</button>
      </div>

      <div class="status" id="error"></div>
    </div>

    <script>
      const roles = ['phone', 'peloton', 'headphones'];
      let discoveredDevices = [];
      const draftMacs = { phone: '', peloton: '', headphones: '' };

      async function api(path, body) {
        const res = await fetch(path, {
          method: body ? 'POST' : 'GET',
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) {
          const msg = await res.text();
          throw new Error(msg || 'Request failed');
        }
        return res.json();
      }

      function setStatus(msg) {
        document.getElementById('error').textContent = msg;
      }

      async function withButton(btn, label, fn) {
        const prev = btn ? btn.textContent : '';
        try {
          if (btn) {
            btn.disabled = true;
            btn.textContent = label;
          }
          await fn();
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.textContent = prev;
          }
        }
      }

      function roleCard(role, slot) {
        const connected = slot?.connected ? '✅ connected' : '❌ disconnected';
        const paired = slot?.paired ? 'paired' : 'not paired';
        const options = ['<option value="">Select discovered device...</option>']
          .concat(discoveredDevices.map((d) => `<option value="${d.mac}">${d.name} (${d.mac})</option>`))
          .join('');

        const isInput = role === 'phone' || role === 'peloton';
        const actions = isInput
          ? `
            <button class="btn" onclick="assignRole('${role}', this)">Save Device</button>
            <div class="small">Connect this from your ${role} Bluetooth settings (not from this app).</div>
          `
          : `
            <button class="btn" onclick="assignRole('${role}', this)">Assign</button>
            <button class="btn" onclick="pairRole('${role}', this)">Pair</button>
            <button class="btn" onclick="connectRole('${role}', this)">Connect</button>
            <button class="btn" onclick="quickConnectRole('${role}', this)">Assign + Pair + Connect</button>
          `;

        return `
          <div class="card">
            <h3>${role}</h3>
            <div class="small">${connected} · ${paired}</div>
            <select class="mac" id="pick-${role}" onchange="pickDevice('${role}')">${options}</select>
            <input class="mac" id="mac-${role}" value="${slot?.mac || draftMacs[role] || ''}" placeholder="MAC address" oninput="updateDraftMac('${role}')" />
            <div>${actions}</div>
          </div>
        `;
      }

      async function refresh() {
        try {
          const data = await api('/status');
          roles.forEach((r) => {
            if (data.bluetooth?.[r]?.mac) draftMacs[r] = data.bluetooth[r].mac;
          });
          document.getElementById('roles').innerHTML = roles.map((r) => roleCard(r, data.bluetooth[r])).join('');

          setSlider('phoneGain', data.audio.phone_gain ?? 0.5);
          setSlider('pelotonGain', data.audio.peloton_gain ?? 0.5);
          setSlider('masterGain', data.audio.master_gain ?? 0.8);
        } catch (e) {
          document.getElementById('error').textContent = String(e.message || e);
        }
      }

      function setMeter(id, active) {
        const el = document.getElementById(id);
        if (!el) return;
        if (!active) {
          el.style.width = '0%';
          return;
        }
        const val = 35 + Math.round(Math.random() * 55);
        el.style.width = `${val}%`;
      }

      async function refreshActivity() {
        try {
          const data = await api('/audio/activity');
          setMeter('phoneMeter', data.phone_active);
          setMeter('pelotonMeter', data.peloton_active);
          setMeter('masterMeter', data.master_active);
        } catch {
          setMeter('phoneMeter', false);
          setMeter('pelotonMeter', false);
          setMeter('masterMeter', false);
        }
      }

      function setSlider(id, value) {
        const el = document.getElementById(id);
        el.value = value;
        document.getElementById(id + 'Val').textContent = `${Math.round(value * 100)}%`;
      }

      ['phoneGain', 'pelotonGain', 'masterGain'].forEach((id) => {
        document.addEventListener('input', (ev) => {
          if (ev.target.id === id) {
            document.getElementById(id + 'Val').textContent = `${Math.round(ev.target.value * 100)}%`;
          }
        });
      });

      function updateDraftMac(role) {
        const input = document.getElementById(`mac-${role}`);
        if (!input) return;
        draftMacs[role] = input.value.trim();
      }

      function pickDevice(role) {
        const sel = document.getElementById(`pick-${role}`);
        if (!sel || !sel.value) return;
        draftMacs[role] = sel.value;
        document.getElementById(`mac-${role}`).value = sel.value;
      }

      async function enablePairingMode(btn) {
        await withButton(btn, 'Enabling...', async () => {
          try {
            const data = await api('/bt/pairing-mode', { seconds: 120 });
            setStatus(`Mixer pairing mode enabled for ${data.seconds}s`);
          } catch (e) {
            setStatus(`Pairing mode failed: ${e.message || e}`);
          }
        });
      }

      async function discoverNodes(btn) {
        await withButton(btn, 'Binding...', async () => {
          try {
            await api('/audio/discover-nodes', {});
            setStatus('Bound active nodes. Visualizers should now respond to audio activity.');
            await refresh();
          } catch (e) {
            setStatus(`Node bind failed: ${e.message || e}`);
          }
        });
      }

      async function scanDevices(btn) {
        await withButton(btn, 'Scanning...', async () => {
          try {
            const data = await api('/bt/scan', { seconds: 8 });
            discoveredDevices = data.devices || [];
            await refresh();
            setStatus(`Found ${discoveredDevices.length} device(s)`);
          } catch (e) {
            setStatus(`Scan failed: ${e.message || e}`);
          }
        });
      }

      async function assignRole(role, btn) {
        await withButton(btn, 'Saving...', async () => {
          const mac = document.getElementById(`mac-${role}`).value.trim();
          draftMacs[role] = mac;
          await api('/bt/assign', { role, mac });
          setStatus(`${role} saved.`);
          await refresh();
        });
      }

      async function pairRole(role, btn) {
        await withButton(btn, 'Pairing...', async () => {
          await api('/bt/pair', { role });
          setStatus(`${role} paired.`);
          await refresh();
        });
      }

      async function connectRole(role, btn) {
        await withButton(btn, 'Connecting...', async () => {
          await api('/bt/connect', { role });
          setStatus(`${role} connect requested.`);
          await refresh();
        });
      }

      async function quickConnectRole(role, btn) {
        await withButton(btn, 'Working...', async () => {
          const mac = document.getElementById(`mac-${role}`).value.trim() || null;
          await api('/bt/quick-connect', { role, mac });
          setStatus(`${role} assign/pair/connect requested.`);
          await refresh();
        });
      }

      async function saveGains() {
        const body = {
          phone_gain: Number(document.getElementById('phoneGain').value),
          peloton_gain: Number(document.getElementById('pelotonGain').value),
          master_gain: Number(document.getElementById('masterGain').value),
        };
        await api('/audio/gains', body);
      }

      function preset(phone, peloton, master) {
        setSlider('phoneGain', phone);
        setSlider('pelotonGain', peloton);
        setSlider('masterGain', master);
        saveGains();
      }

      refresh();
      refreshActivity();
      setInterval(refresh, 5000);
      setInterval(refreshActivity, 400);
    </script>
  </body>
</html>
